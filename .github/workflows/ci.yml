name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-html:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check index.html exists
        run: |
          if [ ! -f index.html ]; then
            echo "::warning::index.html not found yet — skipping HTML validation"
            exit 0
          fi

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate HTML
        run: |
          if [ -f index.html ]; then
            html-validate index.html || true
          fi

  lint-js:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find JS files
        id: find-js
        run: |
          if compgen -G "*.js" > /dev/null || compgen -G "**/*.js" > /dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No JavaScript files found — skipping lint"
          fi

      - name: Setup Node.js
        if: steps.find-js.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ESLint
        if: steps.find-js.outputs.found == 'true'
        run: npm install -g eslint

      - name: Run ESLint
        if: steps.find-js.outputs.found == 'true'
        run: eslint --no-eslintrc --env browser,es2021 --parser-options=ecmaVersion:2022,sourceType:module --rule '{"no-unused-vars":"warn","no-undef":"warn","no-eval":"error","no-implied-eval":"error"}' *.js **/*.js || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for test files
        id: check-tests
        run: |
          if compgen -G "*.test.js" > /dev/null || compgen -G "**/*.test.js" > /dev/null || compgen -G "*.spec.js" > /dev/null || compgen -G "**/*.spec.js" > /dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No test files found — skipping tests"
          fi

      - name: Setup Node.js
        if: steps.check-tests.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test dependencies
        if: steps.check-tests.outputs.found == 'true'
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            npm install --save-dev jest
          fi

      - name: Run tests
        if: steps.check-tests.outputs.found == 'true'
        run: npx jest --passWithNoTests

  security-check:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for suspicious patterns
        run: |
          echo "Scanning for security issues..."
          ISSUES=0

          # Check for eval usage
          if grep -rn "eval(" --include="*.js" --include="*.html" . 2>/dev/null; then
            echo "::warning::Found eval() usage — potential security risk"
            ISSUES=$((ISSUES + 1))
          fi

          # Check for innerHTML with template literals or concatenation
          if grep -rn "innerHTML\s*=" --include="*.js" --include="*.html" . 2>/dev/null | grep -v "innerHTML\s*=\s*['\"][^'\"]*['\"]"; then
            echo "::warning::Found dynamic innerHTML assignment — potential XSS risk"
            ISSUES=$((ISSUES + 1))
          fi

          # Check for hardcoded secrets patterns
          if grep -rn -iE "(api_key|apikey|secret|password|token)\s*[:=]\s*['\"][^'\"]+['\"]" --include="*.js" --include="*.html" . 2>/dev/null; then
            echo "::error::Potential hardcoded secret found"
            ISSUES=$((ISSUES + 1))
          fi

          # Check for external data exfiltration
          if grep -rn -E "(fetch|XMLHttpRequest|navigator\.sendBeacon)" --include="*.js" . 2>/dev/null; then
            echo "::warning::Found network request — verify no camera/user data is sent externally"
          fi

          echo "Security scan complete. Issues found: $ISSUES"
          if [ "$ISSUES" -gt 0 ]; then
            echo "::warning::$ISSUES potential security issue(s) detected — review above"
          fi

  file-size-check:
    name: File Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check total project size
        run: |
          TOTAL_SIZE=$(du -sb . --exclude=.git | cut -f1)
          MAX_SIZE=$((15 * 1024 * 1024))  # 15 MB limit from spec

          echo "Total project size: $(du -sh . --exclude=.git | cut -f1)"

          if [ "$TOTAL_SIZE" -gt "$MAX_SIZE" ]; then
            echo "::error::Project exceeds 15 MB size limit (${TOTAL_SIZE} bytes)"
            exit 1
          else
            echo "Project size is within the 15 MB limit"
          fi
